<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />

    <!-- 🔥 Favicon -->
    <link rel="icon" href="/logo.png" />

    <!-- 🔥 Viewport -->
    <meta name="viewport" content="width=device-width, initial-scale=1" />

    <!-- 🔥 Theme Color -->
    <meta name="theme-color" content="#A6192E" />

    <!-- 🔥 SEO Meta -->
    <title>Dazzler | Premium Car Detailing Services</title>

    <meta
      name="description"
      content="Dazzler offers premium car detailing, ceramic coating, interior cleaning, and car care services. Get showroom shine for your vehicle today."
    />

    <meta
      name="keywords"
      content="car detailing, ceramic coating, car wash, interior cleaning, car polishing, auto detailing India"
    />

    <meta name="author" content="Dazzler Car Detailing" />

    <!-- 🔥 Open Graph (Facebook / WhatsApp) -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Dazzler | Premium Car Detailing" />
    <meta
      property="og:description"
      content="Professional car detailing services for a showroom finish. Book now with Dazzler."
    />
    <meta property="og:image" content="/logo.png" />
    <meta property="og:url" content="https://yourdomain.com" />

    <!-- 🔥 Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Dazzler Car Detailing" />
    <meta
      name="twitter:description"
      content="Get premium car detailing and shine like new with Dazzler."
    />
    <meta name="twitter:image" content="/logo.png" />

    <!-- 🔥 Apple / PWA -->
    <link rel="apple-touch-icon" href="/logo.png" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />

    <!-- 🔥 Manifest -->
    <link rel="manifest" href="%PUBLIC_URL%/manifest.json" />

    <!-- 🔥 Preconnect (Performance Boost) -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <!-- 🔥 Example Google Font (optional) -->
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap"
      rel="stylesheet"
    />

    <!-- 🔥 Robots -->
    <meta name="robots" content="index, follow" />
  </head>

  <body>
    <noscript>You need to enable JavaScript to run this app.</noscript>

    <div id="root"></div>
  </body>
</html>
